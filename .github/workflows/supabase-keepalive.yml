name: Supabase keep-alive

on:
  schedule:
    # Every 3 days at 12:00 UTC. Free-tier projects pause after 7 days
    # of inactivity, so this leaves a safety buffer for missed runs.
    - cron: '0 12 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Call keepalive RPC
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          response=$(curl -fsS -X POST \
            "$SUPABASE_URL/rest/v1/rpc/keepalive" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "Supabase responded: $response"
