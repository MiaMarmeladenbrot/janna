name: Supabase keep-alive

on:
  schedule:
    # Every 5 days at 12:00 UTC. Free-tier projects pause after 7 days
    # of inactivity, so this leaves a safety buffer for missed runs.
    - cron: '0 12 */5 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          curl -fsS \
            "$SUPABASE_URL/rest/v1/app_state?select=user_id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -o /dev/null
          echo "Pinged Supabase successfully."
